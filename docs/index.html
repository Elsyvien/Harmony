<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony Docs</title>
    <meta
      name="description"
      content="Technical documentation for Harmony: architecture, API contracts, data model, operations, and contributor workflows."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true">
      <div class="site-bg__orb site-bg__orb--amber"></div>
      <div class="site-bg__orb site-bg__orb--cyan"></div>
      <div class="site-bg__grid"></div>
    </div>

    <div class="mobile-bar">
      <button id="nav-toggle" class="mobile-bar__button" type="button" aria-label="Open navigation">
        <span></span>
        <span></span>
      </button>
      <a class="mobile-bar__brand" href="#home">
        <span class="mobile-bar__brand-mark">H</span>
        <span>Harmony Docs</span>
      </a>
      <button id="outline-toggle" class="mobile-bar__button" type="button" aria-label="Open outline">
        <span class="mobile-bar__dot"></span>
      </button>
    </div>

    <div class="site-shell">
      <aside id="nav-panel" class="panel panel--nav">
        <div class="brand-lockup">
          <a class="brand-lockup__badge" href="#home">Technical Atlas</a>
          <h1 class="brand-lockup__title">Harmony</h1>
          <p class="brand-lockup__subtitle">
            Engineering documentation rendered as a proper site instead of raw markdown pages.
          </p>
        </div>

        <div class="panel-search">
          <label class="panel-search__label" for="doc-search">Jump To</label>
          <input
            id="doc-search"
            class="panel-search__input"
            type="search"
            placeholder="Search docs, topics, flows..."
            autocomplete="off"
          />
        </div>

        <div class="panel-actions">
          <a class="panel-action" href="#home">Overview</a>
          <a class="panel-action" href="#doc/setup">Quick Start</a>
          <a class="panel-action" href="#doc/architecture">Architecture</a>
        </div>

        <nav id="doc-nav" class="doc-nav" aria-label="Documentation navigation"></nav>
      </aside>

      <main class="panel panel--content">
        <header id="topbar" class="topbar"></header>
        <div id="content" class="content-area"></div>
      </main>

      <aside id="outline-panel" class="panel panel--outline">
        <div id="outline" class="outline"></div>
      </aside>
    </div>

    <noscript>
      <div class="noscript-banner">
        This documentation site needs JavaScript to render the markdown docs shell. Open the raw
        files in <code>docs/</code> if JavaScript is unavailable.
      </div>
    </noscript>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
